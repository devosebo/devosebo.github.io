<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devosebo</title>
  <script>
    const saved = localStorage.getItem('moniq-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#fff; --text:#1a1a1a; --text-secondary:#888; --card-border:#eee; --card-hover:#f7f7f7; --icon-top:#E08060; --icon-bottom:#C06840; --icon-m:rgba(255,255,255,0.92); --toggle-bg:#f0f0f0; --toggle-border:#ddd; }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) { --bg:#111; --text:#f0f0f0; --text-secondary:#666; --card-border:#2e2e2e; --card-hover:#1e1e1e; --icon-top:#1E1612; --icon-bottom:#2A1E16; --icon-m:#D97757; --toggle-bg:#2a2a2a; --toggle-border:#3a3a3a; }
    }
    html[data-theme="dark"] { --bg:#111; --text:#f0f0f0; --text-secondary:#666; --card-border:#2e2e2e; --card-hover:#1e1e1e; --icon-top:#1E1612; --icon-bottom:#2A1E16; --icon-m:#D97757; --toggle-bg:#2a2a2a; --toggle-border:#3a3a3a; }
    html[data-theme="light"] { --bg:#fff; --text:#1a1a1a; --text-secondary:#888; --card-border:#eee; --card-hover:#f7f7f7; --icon-top:#E08060; --icon-bottom:#C06840; --icon-m:rgba(255,255,255,0.92); --toggle-bg:#f0f0f0; --toggle-border:#ddd; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.7; color: var(--text); background: var(--bg); padding: 80px 24px; max-width: 480px; margin: 0 auto; }
    #theme-toggle { position: fixed; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--toggle-border); background: var(--toggle-bg); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    #theme-toggle:hover { opacity: 0.8; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 48px; }
    h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 16px; }
    .app-list { list-style: none; }
    .app-list li { margin-bottom: 16px; }
    .app-list a { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text); padding: 16px; border: 1px solid var(--card-border); border-radius: 12px; transition: background 0.1s; }
    .app-list a:hover { background: var(--card-hover); }
    .app-icon { width: 48px; height: 48px; border-radius: 11px; overflow: hidden; flex-shrink: 0; }
    .app-info .name { font-weight: 600; font-size: 16px; }
    .app-info .desc { font-size: 13px; color: var(--text-secondary); }
    footer { margin-top: 64px; font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle color scheme"></button>

<h1>devosebo</h1>
<p class="sub">Apps by Sebastian Vogel</p>

<h2>Apps</h2>
<ul class="app-list">
  <li>
    <a href="moniq/">
      <div class="app-icon">
        <svg width="48" height="48" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="iconBg" x1="0.5" y1="0" x2="0.5" y2="1">
              <stop offset="0%" style="stop-color: var(--icon-top)"/>
              <stop offset="100%" style="stop-color: var(--icon-bottom)"/>
            </linearGradient>
            <linearGradient id="iconVig" x1="0.5" y1="0" x2="0.5" y2="1">
              <stop offset="0%" stop-color="black" stop-opacity="0"/>
              <stop offset="100%" stop-color="black" stop-opacity="0.12"/>
            </linearGradient>
            <radialGradient id="iconGloss" cx="40%" cy="0%" r="80%">
              <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
              <stop offset="55%"  stop-color="white" stop-opacity="0.04"/>
              <stop offset="100%" stop-color="white" stop-opacity="0"/>
            </radialGradient>
            <filter id="iconShadow">
              <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="black" flood-opacity="0.28"/>
            </filter>
          </defs>
          <rect width="120" height="120" fill="url(#iconBg)"/>
          <rect width="120" height="120" fill="url(#iconVig)"/>
          <rect width="120" height="120" fill="url(#iconGloss)"/>
          <text x="61" y="120" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="118" font-weight="400" style="fill: var(--icon-m)" text-anchor="middle" letter-spacing="-5" filter="url(#iconShadow)">m</text>
        </svg>
      </div>
      <div class="app-info">
        <div class="name">moniq</div>
        <div class="desc">Local-first personal finance tracker</div>
      </div>
    </a>
  </li>
</ul>

<footer>&copy; 2026 Sebastian Vogel</footer>

<script>
  function isDark() {
    const t = document.documentElement.getAttribute('data-theme');
    if (t === 'dark') return true; if (t === 'light') return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  function updateIcon() { document.getElementById('theme-toggle').textContent = isDark() ? '☀' : '🌙'; }
  function toggleTheme() {
    const next = isDark() ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('moniq-theme', next);
    updateIcon();
  }
  updateIcon();
</script>
</body>
</html>
