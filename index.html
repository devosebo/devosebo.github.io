<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devosebo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
      padding: 80px 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 15px; color: #888; margin-bottom: 48px; }
    h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 16px; }
    .app-list { list-style: none; }
    .app-list li { margin-bottom: 16px; }
    .app-list a {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      padding: 16px;
      border: 1px solid #eee;
      border-radius: 12px;
      transition: background 0.1s;
    }
    .app-list a:hover { background: #f7f7f7; }
    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 11px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-info .name { font-weight: 600; font-size: 16px; }
    .app-info .desc { font-size: 13px; color: #888; }
    footer { margin-top: 64px; font-size: 13px; color: #ccc; }
  </style>
</head>
<body>

<h1>devosebo</h1>
<p class="sub">Apps by Sebastian Vogel</p>

<h2>Apps</h2>
<ul class="app-list">
  <li>
    <a href="moniq/">
      <div class="app-icon">
        <svg width="48" height="48" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="iconBg" x1="0.5" y1="0" x2="0.5" y2="1">
              <stop offset="0%" stop-color="#E08060"/>
              <stop offset="100%" stop-color="#C06840"/>
            </linearGradient>
          </defs>
          <rect width="96" height="96" fill="url(#iconBg)"/>
          <text x="50" y="72"
            font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, sans-serif"
            font-size="70" font-weight="200" fill="rgba(255,255,255,0.92)"
            text-anchor="middle" letter-spacing="-2">m</text>
        </svg>
      </div>
      <div class="app-info">
        <div class="name">moniq</div>
        <div class="desc">Local-first personal finance tracker</div>
      </div>
    </a>
  </li>
</ul>

<footer>&copy; 2026 Sebastian Vogel</footer>

</body>
</html>
