<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devosebo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #888;
      --card-border: #eee;
      --card-hover: #f7f7f7;
      --icon-top: #E08060;
      --icon-bottom: #C06840;
      --icon-m: rgba(255,255,255,0.92);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --text: #f0f0f0;
        --text-secondary: #666;
        --card-border: #2e2e2e;
        --card-hover: #1e1e1e;
        --icon-top: #1E1612;
        --icon-bottom: #2A1E16;
        --icon-m: #D97757;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      padding: 80px 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 48px; }
    h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 16px; }
    .app-list { list-style: none; }
    .app-list li { margin-bottom: 16px; }
    .app-list a {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      padding: 16px;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: background 0.1s;
    }
    .app-list a:hover { background: var(--card-hover); }
    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 11px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-info .name { font-weight: 600; font-size: 16px; }
    .app-info .desc { font-size: 13px; color: var(--text-secondary); }
    footer { margin-top: 64px; font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body>

<h1>devosebo</h1>
<p class="sub">Apps by Sebastian Vogel</p>

<h2>Apps</h2>
<ul class="app-list">
  <li>
    <a href="moniq/">
      <div class="app-icon">
        <svg width="48" height="48" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="iconBg" x1="0.5" y1="0" x2="0.5" y2="1">
              <stop offset="0%" style="stop-color: var(--icon-top)"/>
              <stop offset="100%" style="stop-color: var(--icon-bottom)"/>
            </linearGradient>
          </defs>
          <rect width="96" height="96" fill="url(#iconBg)"/>
          <text x="50" y="72"
            font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, sans-serif"
            font-size="70" font-weight="200"
            style="fill: var(--icon-m)"
            text-anchor="middle" letter-spacing="-2">m</text>
        </svg>
      </div>
      <div class="app-info">
        <div class="name">moniq</div>
        <div class="desc">Local-first personal finance tracker</div>
      </div>
    </a>
  </li>
</ul>

<footer>&copy; 2026 Sebastian Vogel</footer>

</body>
</html>
